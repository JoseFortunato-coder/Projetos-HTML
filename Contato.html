<!DOCTYPE html>
<html>
<head>
    <title>Contato</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        #form-endereco {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        
        .campo {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .campo label {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }
        
        .campo input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #334155;
            transition: all 0.3s ease;
            background-color: #fff;
        }
           .campo textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #334155;
            transition: all 0.3s ease;
            background-color: #fff;
        }
        
        .campo input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .campo textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        
        .campo input:read-only {
            background-color: #f1f5f9;
            color: #64748b;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }
            .campo textarea:read-only {
                background-color: #f1f5f9;
                color: #64748b;
                border-color: #e2e8f0;
                cursor: not-allowed;
            }
        
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }
        
        button[type="submit"]:hover {
            background-color: #2563eb;
        }
        
        button[type="submit"]:active {
            background-color: #1d4ed8;
        }
        
    </style>
</head>
<body>

    <form id="form-endereco">
        <div class="campo">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome" required>
        </div>
        <div class="campo">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Digite o email" required>
        </div>
        <div class="campo">
            <label for="mensagem">Mensagem:</label>
             <textarea id="mensagem" name="mensagem" placeholder="Digite a mensagem" required rows="4"></textarea>
        </div>
       
        <button type="submit">Enviar informaçõe</button>
    </form>
</body>
</html>
